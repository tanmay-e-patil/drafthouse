services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drafthouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drafthouse}
      POSTGRES_DB: ${POSTGRES_DB:-drafthouse}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drafthouse}"]
      interval: 5s
      timeout: 5s
      retries: 10

  scylla:
    image: scylladb/scylla:6.2
    command: --smp 1 --memory 512M --developer-mode 1
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "nodetool status || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  migrate-pg:
    image: ghcr.io/tanmay-e-patil/drafthouse:latest
    command: /app/migrate-pg
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-drafthouse}:${POSTGRES_PASSWORD:-drafthouse}@postgres:5432/${POSTGRES_DB:-drafthouse}
      MIGRATIONS_DIR: /app/migrations/postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  migrate-scylla:
    image: ghcr.io/tanmay-e-patil/drafthouse:latest
    command: /app/migrate-scylla
    environment:
      SCYLLA_NODES: scylla:9042
      SCYLLA_KEYSPACE: drafthouse
      SCYLLA_MIGRATIONS_DIR: /app/migrations/scylla
    depends_on:
      scylla:
        condition: service_healthy
    restart: "no"

  app:
    image: ghcr.io/tanmay-e-patil/drafthouse:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-drafthouse}:${POSTGRES_PASSWORD:-drafthouse}@postgres:5432/${POSTGRES_DB:-drafthouse}
      SCYLLA_NODES: scylla:9042
      SCYLLA_KEYSPACE: drafthouse
      BIND_ADDR: 0.0.0.0:8080
    depends_on:
      migrate-pg:
        condition: service_completed_successfully
      migrate-scylla:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pg_data:
  scylla_data:
